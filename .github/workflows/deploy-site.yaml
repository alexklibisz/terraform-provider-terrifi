name: Deploy Site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - site/**
      - cmd/terrifi/list_device_types.go
      - internal/provider/fingerprint_api.go
      - .github/workflows/deploy-site.yaml

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on:
      - self-hosted
      - terrifi-hardware-test
    env:
      UNIFI_API: https://192.168.1.3:11443
      UNIFI_API_KEY: ${{ secrets.TERRIFI_HIL_TEST_UNIFI_API_KEY }}
      UNIFI_INSECURE: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        timeout-minutes: 1
        uses: actions/checkout@v4

      - name: Set up Go
        timeout-minutes: 1
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Build CLI
        timeout-minutes: 5
        run: go build -o terrifi ./cmd/terrifi

      - name: Generate device types page
        timeout-minutes: 10
        run: ./terrifi list-device-types --html

      - name: Assemble site
        run: cp -r unifi-device-types site/device-types

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
